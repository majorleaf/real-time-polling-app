<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Poll Dashboard</title>
    <!-- Import Tailwind for beautiful styling without external CSS files -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Import the browser version of Socket.io -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bar-transition { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div id="vote-page" class="max-w-xl w-full bg-slate-800 rounded-3xl shadow-2xl border border-slate-700 overflow-hidden block transition-all">
        
        <!-- Header Section -->
        <div class="bg-slate-900/50 p-6 border-b border-slate-700 flex justify-between items-start sm:items-center flex-col sm:flex-row gap-4">
            <div>
                <h1 id="poll-title" class="text-2xl font-bold text-white">Connecting to server...</h1>
                <p class="text-slate-400 text-sm mt-1">Real-time WebSocket Sync</p>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2 bg-slate-800 px-3 py-1.5 rounded-full border border-slate-600">
                    <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-red-500 transition-colors"></div>
                    <span id="status-text" class="text-xs font-medium text-slate-300">Offline</span>
                </div>
                <!-- The button that navigates to the "Create" page -->
                <button onclick="togglePage('create-page')" class="text-sm bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 rounded-full shadow border border-blue-500 transition-colors font-medium">
                    + New Poll
                </button>
            </div>
        </div>

        <div class="p-6">
            <div id="options-container" class="space-y-4">
                <p class="text-center text-slate-500 py-8">Awaiting data...</p>
            </div>

            <!-- Quick Add Option Input -->
            <div class="mt-6 pt-6 border-t border-slate-700 flex gap-2">
                <input type="text" id="quick-add-input" placeholder="Add a new option..." class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all" onkeypress="if(event.key === 'Enter') submitNewOption()">
                <button onclick="submitNewOption()" class="bg-slate-700 hover:bg-slate-600 text-white px-5 py-2.5 rounded-xl text-sm transition-colors font-medium shadow">Add</button>
            </div>
        </div>
    </div>

    <div id="create-page" class="max-w-xl w-full bg-slate-800 rounded-3xl shadow-2xl border border-slate-700 overflow-hidden hidden transition-all">
        <div class="bg-slate-900/50 p-6 border-b border-slate-700">
            <h2 class="text-2xl font-bold text-white">Create a New Poll</h2>
            <p class="text-slate-400 text-sm mt-1">This will instantly replace the active poll for all connected users.</p>
        </div>
        
        <div class="p-6 space-y-5">
            <!-- Poll Title Input -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5">Poll Topic</label>
                <input type="text" id="new-poll-title" placeholder="e.g., Best Programming Language" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                <p id="title-error" class="text-red-400 text-xs mt-1.5 hidden">Please enter a poll topic.</p>
            </div>

            <!-- Poll Options Input -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5">Initial Options <span class="text-slate-500">(Comma separated)</span></label>
                <input type="text" id="new-poll-options" placeholder="e.g., Python, JavaScript, Rust" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
            </div>

            <!-- Form Actions -->
            <div class="flex justify-end gap-3 pt-2">
                <button onclick="togglePage('vote-page')" class="px-5 py-2.5 rounded-xl text-slate-300 hover:bg-slate-700 transition-colors font-medium">Cancel</button>
                <button onclick="submitNewPoll()" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl shadow-lg transition-colors font-medium">Launch Poll</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io('https://real-time-polling-app-h8f3.onrender.com/');

        // UI Elements
        const titleEl = document.getElementById('poll-title');
        const container = document.getElementById('options-container');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        // Page Containers
        const votePage = document.getElementById('vote-page');
        const createPage = document.getElementById('create-page');

        // Toggles visibility between the two "pages"
        function togglePage(pageId) {
            if (pageId === 'create-page') {
                votePage.classList.add('hidden');
                createPage.classList.remove('hidden');
                
                // Focus the input and clear any old errors
                document.getElementById('new-poll-title').focus();
                document.getElementById('title-error').classList.add('hidden');
                document.getElementById('new-poll-title').classList.remove('border-red-500');
            } else {
                createPage.classList.add('hidden');
                votePage.classList.remove('hidden');
            }
        }

        function submitNewPoll() {
            const titleInput = document.getElementById('new-poll-title');
            const optionsInput = document.getElementById('new-poll-options');
            const title = titleInput.value.trim();
            
            // Custom UI validation
            if (!title) {
                titleInput.classList.add('border-red-500');
                document.getElementById('title-error').classList.remove('hidden');
                return;
            }

            // Parse the comma-separated options into an array
            const options = optionsInput.value.split(',').map(opt => opt.trim()).filter(opt => opt.length > 0);

            // Send the events to the NestJS Server
            socket.emit('CREATE_POLL', title);
            options.forEach(opt => socket.emit('ADD_OPTION', opt));

            // Clear inputs and navigate back to the voting page
            titleInput.value = '';
            optionsInput.value = '';
            togglePage('vote-page');
        }

        function submitNewOption() {
            const input = document.getElementById('quick-add-input');
            const val = input.value.trim();
            if (val) {
                socket.emit('ADD_OPTION', val);
                input.value = ''; // clear input after submitting
            }
        }

        socket.on('connect', () => {
            statusDot.classList.replace('bg-red-500', 'bg-green-500');
            statusText.innerText = 'Live';
            socket.emit('GET_POLL_STATUS'); // Ask for data immediately
        });

        socket.on('disconnect', () => {
            statusDot.classList.replace('bg-green-500', 'bg-red-500');
            statusText.innerText = 'Offline';
            titleEl.innerText = 'Disconnected';
        });

        socket.on('POLL_UPDATE', (data) => {
            titleEl.innerText = data.title;
            container.innerHTML = ''; 

            const optionsArray = Object.entries(data.options);
            const totalVotes = optionsArray.reduce((sum, [, votes]) => sum + votes, 0);
            
            if (optionsArray.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-500 py-4">No options yet. Add one below to start the poll!</p>';
                return;
            }

            optionsArray.forEach(([option, votes]) => {
                const percentage = totalVotes === 0 ? 0 : Math.round((votes / totalVotes) * 100);
                
                // Create a clickable button for each option
                const btn = document.createElement('div');
                btn.className = "relative bg-slate-900 rounded-xl p-4 cursor-pointer hover:bg-slate-700 border border-slate-700 transition-colors group overflow-hidden shadow-sm";
                btn.onclick = () => socket.emit('VOTE', option);

                // The background progress bar
                const bar = document.createElement('div');
                bar.className = `absolute top-0 left-0 h-full bg-blue-600/30 bar-transition`;
                bar.style.width = `${percentage}%`;

                // The text content
                const content = document.createElement('div');
                content.className = "relative z-10 flex justify-between items-center";
                content.innerHTML = `
                    <span class="font-semibold text-white text-lg">${option}</span>
                    <div class="text-right">
                        <div class="font-bold text-white text-xl">${percentage}%</div>
                        <div class="text-xs text-slate-400">${votes} votes</div>
                    </div>
                `;

                btn.appendChild(bar);
                btn.appendChild(content);
                container.appendChild(btn);
            });
        });
    </script>
</body>
</html>
